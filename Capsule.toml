[package]
name = "astrid-capsule-system"
version = "0.1.0"
description = "System management tools — lets the LLM inspect and manage its own runtime"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "system-tools"
file = "astrid_capsule_system.wasm"
type = "executable"

[capabilities]
fs_read  = ["home://"]
fs_write = ["home://skills/"]
ipc_publish = ["tool.v1.execute.*.result", "tool.v1.response.describe.*"]
ipc_subscribe = ["tool.v1.execute.list_capsules", "tool.v1.execute.inspect_capsule", "tool.v1.execute.list_interfaces", "tool.v1.execute.read_interface", "tool.v1.execute.system_status", "tool.v1.request.describe"]

[[interceptor]]
event = "tool.v1.execute.list_capsules"
action = "tool_execute_list_capsules"

[[interceptor]]
event = "tool.v1.execute.inspect_capsule"
action = "tool_execute_inspect_capsule"

[[interceptor]]
event = "tool.v1.execute.list_interfaces"
action = "tool_execute_list_interfaces"

[[interceptor]]
event = "tool.v1.execute.read_interface"
action = "tool_execute_read_interface"

[[interceptor]]
event = "tool.v1.execute.system_status"
action = "tool_execute_system_status"

[[interceptor]]
event = "tool.v1.request.describe"
action = "tool_describe"
